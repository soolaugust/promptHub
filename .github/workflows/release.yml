name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Bump patch version
        id: bump
        run: |
          # 读取当前版本
          CURRENT=$(grep '^version' prompthub/Cargo.toml | head -1 | sed 's/.*= *"\(.*\)"/\1/')
          echo "Current version: $CURRENT"

          # patch +1
          MAJOR=$(echo $CURRENT | cut -d. -f1)
          MINOR=$(echo $CURRENT | cut -d. -f2)
          PATCH=$(echo $CURRENT | cut -d. -f3)
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="$MAJOR.$MINOR.$NEW_PATCH"
          echo "New version: $NEW_VERSION"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

          # 只更新 prompthub/Cargo.toml 版本，暂不修改 registry（避免发布前依赖检查失败）
          sed -i "s/^version = \"$CURRENT\"/version = \"$NEW_VERSION\"/" prompthub/Cargo.toml

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Publish prompthub
        run: cargo publish -p prompthub --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io indexing
        run: sleep 60

      - name: Update registry Cargo.toml and publish ph-registry
        run: |
          NEW_VERSION="${{ steps.bump.outputs.new_version }}"
          CURRENT=$(grep '^version' registry/Cargo.toml | head -1 | sed 's/.*= *"\(.*\)"/\1/')

          # 更新 registry 版本号
          sed -i "s/^version = \"$CURRENT\"/version = \"$NEW_VERSION\"/" registry/Cargo.toml

          # 替换 path 依赖为版本依赖
          sed -i 's|prompthub = { path = "\.\./prompthub"[^}]* }|prompthub = "'"$NEW_VERSION"'"|' registry/Cargo.toml

          cargo publish -p ph-registry --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Commit version bumps and restore path dependency
        run: |
          NEW_VERSION="${{ steps.bump.outputs.new_version }}"

          # 提交 prompthub 版本 bump
          git add prompthub/Cargo.toml

          # 还原 registry path 依赖，提交 registry 版本 bump
          sed -i 's|prompthub = "[^"]*"|prompthub = { path = "../prompthub", default-features = false }|' registry/Cargo.toml
          git add registry/Cargo.toml

          git commit -m "chore: bump version to $NEW_VERSION"
          git push origin HEAD:master

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
