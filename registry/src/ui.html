<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PromptHub Registry</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #1e1e2e;
    --surface: #2a2a3e;
    --surface2: #313145;
    --accent: #f28b34;
    --accent2: #cba6f7;
    --text: #cdd6f4;
    --text-muted: #7f849c;
    --green: #a6e3a1;
    --red: #f38ba8;
    --border: #45475a;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Fira Code', 'Cascadia Code', 'JetBrains Mono', monospace;
    font-size: 14px;
    min-height: 100vh;
  }

  /* ── Layout ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-size: 18px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: -0.5px;
  }

  .logo span { color: var(--text-muted); }

  nav { display: flex; gap: 4px; }

  nav button {
    background: none;
    border: none;
    color: var(--text-muted);
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    transition: all 0.15s;
  }

  nav button:hover { background: var(--surface2); color: var(--text); }
  nav button.active { background: var(--surface2); color: var(--accent); }

  main { padding: 24px; max-width: 1200px; margin: 0 auto; }

  /* ── Views ── */
  .view { display: none; }
  .view.active { display: block; }

  /* ── Stats Cards ── */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 32px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px 24px;
  }

  .stat-card .label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  .stat-card .value {
    font-size: 36px;
    font-weight: 700;
    color: var(--accent);
  }

  /* ── Section Headers ── */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .section-title {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-muted);
  }

  /* ── Layer Cards Grid ── */
  .layers-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 14px;
  }

  .layer-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 18px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
  }

  .layer-card:hover {
    border-color: var(--accent);
    background: var(--surface2);
  }

  .layer-card .ns-badge {
    display: inline-block;
    background: rgba(242, 139, 52, 0.15);
    color: var(--accent);
    border: 1px solid rgba(242, 139, 52, 0.3);
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 4px;
    margin-bottom: 8px;
  }

  .layer-card .layer-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
  }

  .layer-card .layer-meta {
    font-size: 12px;
    color: var(--text-muted);
    display: flex;
    gap: 12px;
  }

  .layer-card .version-tag {
    color: var(--green);
  }

  /* ── Search ── */
  .search-bar {
    position: relative;
    margin-bottom: 20px;
  }

  .search-bar input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    padding: 10px 16px 10px 40px;
    outline: none;
    transition: border-color 0.15s;
  }

  .search-bar input:focus { border-color: var(--accent); }
  .search-bar input::placeholder { color: var(--text-muted); }

  .search-bar .icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 16px;
  }

  /* ── Detail Panel ── */
  .detail-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  .detail-header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
  }

  .detail-header .back-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    white-space: nowrap;
    transition: all 0.15s;
  }

  .detail-header .back-btn:hover { border-color: var(--accent); color: var(--accent); }

  .detail-title { font-size: 20px; font-weight: 700; }
  .detail-ns { color: var(--accent); margin-right: 4px; }

  .version-tabs {
    padding: 12px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }

  .version-tabs .tab-label {
    font-size: 11px;
    color: var(--text-muted);
    margin-right: 4px;
  }

  .ver-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 4px 10px;
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
    transition: all 0.15s;
  }

  .ver-btn:hover { border-color: var(--accent); color: var(--accent); }
  .ver-btn.active { border-color: var(--green); color: var(--green); background: rgba(166,227,161,0.1); }

  .detail-content {
    padding: 24px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
  }

  @media (max-width: 800px) {
    .detail-content { grid-template-columns: 1fr; }
    .stats-grid { grid-template-columns: 1fr; }
  }

  .content-block .block-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-muted);
    margin-bottom: 10px;
  }

  pre {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    overflow-x: auto;
    font-size: 13px;
    line-height: 1.6;
    max-height: 480px;
    overflow-y: auto;
    white-space: pre-wrap;
    word-break: break-word;
  }

  /* ── Empty / Loading ── */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }

  .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; }

  .loading {
    text-align: center;
    padding: 40px;
    color: var(--text-muted);
  }

  /* ── Recent list ── */
  .recent-list { display: flex; flex-direction: column; gap: 8px; }

  .recent-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    transition: border-color 0.15s;
  }

  .recent-item:hover { border-color: var(--accent); }

  .recent-item .item-name { font-weight: 600; }
  .recent-item .item-ns { color: var(--accent); font-size: 12px; }
  .recent-item .item-ver { color: var(--green); font-size: 12px; }

  /* ── Scrollbars ── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
</style>
</head>
<body>

<header>
  <div class="logo">prompt<span>hub</span> registry</div>
  <nav>
    <button class="active" onclick="showView('dashboard')">Dashboard</button>
    <button onclick="showView('layers')">Layers</button>
  </nav>
</header>

<main>
  <!-- Dashboard View -->
  <div id="view-dashboard" class="view active">
    <div class="stats-grid" id="stats-grid">
      <div class="stat-card"><div class="label">Total Layers</div><div class="value" id="stat-layers">—</div></div>
      <div class="stat-card"><div class="label">Total Versions</div><div class="value" id="stat-versions">—</div></div>
      <div class="stat-card"><div class="label">Namespaces</div><div class="value" id="stat-namespaces">—</div></div>
    </div>

    <div class="section-header">
      <div class="section-title">Recent Layers</div>
    </div>
    <div id="recent-list" class="recent-list">
      <div class="loading">Loading…</div>
    </div>
  </div>

  <!-- Layers View -->
  <div id="view-layers" class="view">
    <div class="search-bar">
      <span class="icon">⌕</span>
      <input type="text" id="search-input" placeholder="Search layers by name, namespace, or description…" oninput="onSearch(this.value)">
    </div>
    <div id="layers-grid" class="layers-grid">
      <div class="loading">Loading…</div>
    </div>
  </div>

  <!-- Detail View -->
  <div id="view-detail" class="view">
    <div class="detail-panel">
      <div class="detail-header">
        <div>
          <div class="detail-title">
            <span class="detail-ns" id="detail-ns"></span><span id="detail-name"></span>
          </div>
        </div>
        <button class="back-btn" onclick="goBack()">← Back</button>
      </div>
      <div class="version-tabs" id="version-tabs"></div>
      <div class="detail-content">
        <div class="content-block">
          <div class="block-title">layer.yaml</div>
          <pre id="detail-yaml">Loading…</pre>
        </div>
        <div class="content-block">
          <div class="block-title">prompt.md</div>
          <pre id="detail-prompt">Loading…</pre>
        </div>
      </div>
    </div>
  </div>
</main>

<script>
  let allLayers = [];
  let searchTimer = null;
  let prevView = 'dashboard';

  // ── Navigation ─────────────────────────────────────────────────────────────

  function showView(name) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById('view-' + name).classList.add('active');
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    const btn = [...document.querySelectorAll('nav button')].find(b => b.textContent.toLowerCase() === name);
    if (btn) btn.classList.add('active');
    if (name !== 'detail') prevView = name;
  }

  function goBack() { showView(prevView); }

  // ── Data Loading ────────────────────────────────────────────────────────────

  async function init() {
    try {
      const [stats, layers] = await Promise.all([
        fetch('/api/stats').then(r => r.json()),
        fetch('/layers').then(r => r.json())
      ]);
      allLayers = layers;
      renderStats(stats);
      renderRecent(layers);
      renderLayerGrid(layers);
    } catch (e) {
      console.error('Init error:', e);
    }
  }

  function renderStats(stats) {
    document.getElementById('stat-layers').textContent = stats.total_layers;
    document.getElementById('stat-versions').textContent = stats.total_versions;
    document.getElementById('stat-namespaces').textContent = stats.namespaces;
  }

  function renderRecent(layers) {
    const el = document.getElementById('recent-list');
    if (!layers.length) {
      el.innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>No layers pushed yet.</p></div>';
      return;
    }
    const recent = layers.slice(0, 8);
    el.innerHTML = recent.map(l => `
      <div class="recent-item" onclick="openDetail('${esc(l.namespace)}', '${esc(l.name)}', ${JSON.stringify(l.versions)}, '${esc(l.latest)}')">
        <div>
          <div class="item-name">${esc(l.name)}</div>
          <div class="item-ns">${esc(l.namespace)}</div>
        </div>
        <div class="item-ver">${esc(l.latest)}</div>
      </div>
    `).join('');
  }

  function renderLayerGrid(layers) {
    const el = document.getElementById('layers-grid');
    if (!layers.length) {
      el.innerHTML = '<div class="empty-state"><div class="icon">🔍</div><p>No layers found.</p></div>';
      return;
    }
    el.innerHTML = layers.map(l => `
      <div class="layer-card" onclick="openDetail('${esc(l.namespace)}', '${esc(l.name)}', ${JSON.stringify(l.versions)}, '${esc(l.latest)}')">
        <div class="ns-badge">${esc(l.namespace)}</div>
        <div class="layer-name">${esc(l.name)}</div>
        <div class="layer-meta">
          <span class="version-tag">${esc(l.latest)}</span>
          <span>${l.versions.length} version${l.versions.length !== 1 ? 's' : ''}</span>
        </div>
      </div>
    `).join('');
  }

  // ── Search ──────────────────────────────────────────────────────────────────

  function onSearch(q) {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => doSearch(q), 300);
  }

  async function doSearch(q) {
    const url = q.trim() ? `/layers?q=${encodeURIComponent(q.trim())}` : '/layers';
    try {
      const layers = await fetch(url).then(r => r.json());
      renderLayerGrid(layers);
    } catch (e) {
      console.error('Search error:', e);
    }
  }

  // ── Detail ──────────────────────────────────────────────────────────────────

  async function openDetail(ns, name, versions, activeVer) {
    document.getElementById('detail-ns').textContent = ns + '/';
    document.getElementById('detail-name').textContent = name;

    // Render version tabs
    const tabsEl = document.getElementById('version-tabs');
    tabsEl.innerHTML = `<span class="tab-label">Versions:</span>` +
      versions.map(v => `
        <button class="ver-btn ${v === activeVer ? 'active' : ''}"
                onclick="switchVersion('${esc(ns)}', '${esc(name)}', ${JSON.stringify(versions)}, '${esc(v)}')">
          ${esc(v)}
        </button>
      `).join('');

    document.getElementById('detail-yaml').textContent = 'Loading…';
    document.getElementById('detail-prompt').textContent = 'Loading…';

    showView('detail');

    await loadVersionContent(ns, name, activeVer);
  }

  async function switchVersion(ns, name, versions, ver) {
    // Update active tab
    document.querySelectorAll('.ver-btn').forEach(b => {
      b.classList.toggle('active', b.textContent.trim() === ver);
    });
    document.getElementById('detail-yaml').textContent = 'Loading…';
    document.getElementById('detail-prompt').textContent = 'Loading…';
    await loadVersionContent(ns, name, ver);
  }

  async function loadVersionContent(ns, name, ver) {
    try {
      const [yaml, prompt] = await Promise.all([
        fetch(`/layers/${ns}/${name}/${ver}/layer.yaml`).then(r => r.ok ? r.text() : `# Not found`),
        fetch(`/layers/${ns}/${name}/${ver}/prompt.md`).then(r => r.ok ? r.text() : `<!-- Not found -->`)
      ]);
      document.getElementById('detail-yaml').textContent = yaml;
      document.getElementById('detail-prompt').textContent = prompt;
    } catch (e) {
      document.getElementById('detail-yaml').textContent = '# Error loading content';
      document.getElementById('detail-prompt').textContent = '<!-- Error loading content -->';
    }
  }

  // ── Util ─────────────────────────────────────────────────────────────────────

  function esc(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  // ── Start ─────────────────────────────────────────────────────────────────────

  const _initView = new URLSearchParams(location.search).get('view');
  if (_initView) showView(_initView);
  init();
</script>
</body>
</html>
